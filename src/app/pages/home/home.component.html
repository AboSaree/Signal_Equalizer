<main class="hero" role="main">

  <!-- Product image — right side, vertically centered -->
  <div class="hero__image-wrapper" aria-hidden="true">
    <img class="hero__image" src="images/Equalizer.png" alt="Signal Equalizer device" loading="eager" />
  </div>

  <!-- Copy block — left side -->
  <div class="hero__content">
    <h1 class="hero__headline">
      <span class="hero__headline-line">Signal</span>
      <span class="hero__headline-line">Equalizer</span>
    </h1>

    <p class="hero__body">
      signals drive modern science and technology&mdash; this signal equalizer platform lets you visualize, analyze, and
      enhance signals through powerful interactive controls
    </p>

    <!-- START button — centered relative to "Signal Equalizer" headline -->
    <button class="hero__cta" (click)="onStartClick()" aria-label="Start — navigate to the app">
      Start
    </button>
  </div>

</main>
